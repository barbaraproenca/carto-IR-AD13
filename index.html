<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie des Instruments de Recherche - AD13</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Archives départementales des Bouches-du-Rhône</h1>
            <p class="subtitle">Cartographie des Instruments de Recherche</p>
        </div>
    </header>

    <main class="main-container">
        <section class="stats-bar" id="statsBar"></section>

        <section class="visualization-section">
            <div class="sunburst-container">
                <h2>Structure des séries (sunburst)</h2>
                <div id="sunburst"></div>
                <div class="breadcrumb" id="breadcrumb"></div>
            </div>

            <div class="barchart-container">
                <h2>Instruments par série</h2>
                <div id="barchart"></div>
            </div>

            <aside class="filters-panel">
                <div class="search-box">
                    <h3>Rechercher</h3>
                    <input type="text" id="searchInput" placeholder="Rechercher une cote, un thème...">
                </div>

                <div class="filter-section">
                    <h3>Filtrer par série</h3>
                    <div class="series-buttons" id="seriesButtons">
                        <button class="series-btn active" data-series="all">Toutes</button>
                    </div>
                </div>

                <div class="filter-section">
                    <h3>Thématiques W</h3>
                    <div class="theme-list" id="themeList"></div>
                </div>
            </aside>
        </section>

        <section class="results-section">
            <div class="results-header">
                <h2>Résultats</h2>
                <span class="results-count" id="resultsCount">0 instrument(s)</span>
            </div>
            <div class="results-list" id="resultsList"></div>
        </section>

        <section class="details-panel" id="detailsPanel">
            <button class="close-btn" id="closeDetails">&times;</button>
            <div id="detailsContent"></div>
        </section>
    </main>

    <div class="tooltip" id="tooltip"></div>

    <footer class="footer">
        <p>Source : <a href="https://www.archives13.fr" target="_blank">archives13.fr</a> | Données mises à jour le 26/03/2026</p>
    </footer>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
